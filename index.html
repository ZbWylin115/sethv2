<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seth at Sunset</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div id="game" class="game-shell">
      
      <div class="top-bar">
        <h1>Seth at Sunset</h1>
        <div class="subtitle">A campy little zoo dating sim</div>
      </div>

      <div class="main-panel">
        <div class="portrait-panel">
          <div id="portraitFrame" class="portrait-frame">
            <div class="portrait-label">SETH</div>
            <div class="portrait-placeholder">
              <div class="head"></div>
              <div class="body"></div>
            </div>
          </div>

          <div class="vibe-box">
            <div class="vibe-title">Vibe Check</div>
            <div id="vibeText">Warm afternoon. Mild tension. Decent odds.</div>
          </div>
        </div>

        <div class="story-panel">
          <div id="nameplate" class="nameplate">Narrator</div>
          <div id="text" class="text-box"></div>
          <div id="choices" class="choices"></div>
        </div>
      </div>

      <div class="footer-bar">
        <button id="restartBtn" class="utility-btn">Restart</button>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
